<!DOCTYPE html>
<html>

<head>
<title>Register</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

form{
    background:#111827;
    padding:30px;
    border-radius:12px;
    width:300px;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:6px;
}

button{
    width:100%;
    padding:10px;
    margin-top:15px;
    border:none;
    border-radius:6px;
    background:#22c55e;
    color:white;
    font-size:16px;
}

a{
    color:#60a5fa;
}

</style>

</head>

<body>

<form method="POST">

<h2>Register</h2>

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">

Create Account

</button>

<br><br>

<a href="/">Login</a>

</form>

</body>
</html>
