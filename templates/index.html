<!DOCTYPE html>
<html>

<head>

<title>CyberWatch Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{

    margin:0;
    padding:20px;

    font-family:Arial;

    background:
    linear-gradient(
        135deg,
        #0f172a,
        #1e3a8a,
        #9333ea
    );

    color:white;

    transition:0.4s;
}

/* LIGHT MODE */

body.light-mode{

    background:#f3f4f6;

    color:black;
}

/* TITLE */

h1{

    text-align:center;

    font-size:42px;

    margin-bottom:25px;
}

/* BUTTONS */

.top-buttons{

    text-align:center;

    margin-bottom:25px;
}

.btn{

    padding:12px 18px;

    border:none;

    border-radius:12px;

    color:white;

    cursor:pointer;

    font-size:15px;

    font-weight:bold;

    margin:5px;

    transition:0.3s;
}

.btn:hover{

    transform:scale(1.07);
}

.start{
    background:#22c55e;
}

.stop{
    background:#ef4444;
}

.logout{
    background:#f59e0b;
}

.theme{
    background:#3b82f6;
}

.export{
    background:#8b5cf6;
}

/* STATUS */

#status{

    text-align:center;

    font-size:24px;

    font-weight:bold;

    margin-bottom:25px;
}

/* GRID */

.container{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:20px;
}

/* CARD */

.card{

    background:#020617;

    padding:18px;

    border-radius:16px;

    box-shadow:0 0 18px black;
}

body.light-mode .card{

    background:white;

    color:black;
}

.card h2{

    font-size:26px;

    margin-bottom:12px;
}

/* LIST */

ul{

    max-height:320px;

    overflow:auto;

    padding-left:20px;
}

li{

    margin-bottom:7px;

    font-size:15px;
}

/* GRAPH */

.graph-title{

    text-align:center;

    font-size:34px;

    margin-top:45px;

    margin-bottom:15px;

    font-weight:bold;
}

canvas{

    background:#020617;

    border-radius:16px;

    padding:20px;

    width:100% !important;

    height:550px !important;

    box-shadow:0 0 18px black;
}

body.light-mode canvas{

    background:white;
}

/* MAP */

#map{

    height:450px;

    margin-top:25px;

    border-radius:16px;

    overflow:hidden;

    box-shadow:0 0 18px black;
}

/* NOTIFICATIONS */

.notifications{

    margin-top:30px;
}

.notification-item{

    background:#dc2626;

    padding:14px;

    border-radius:12px;

    margin-top:10px;

    font-weight:bold;

    box-shadow:0 0 10px black;
}

/* GEO IP */

.geo-box{

    margin-top:30px;
}

.geo-card{

    background:#111827;

    padding:15px;

    border-radius:12px;

    margin-top:10px;

    box-shadow:0 0 10px black;
}

body.light-mode .geo-card{

    background:#e5e7eb;

    color:black;
}

/* MOBILE */

@media(max-width:768px){

    h1{

        font-size:30px;
    }

    .container{

        grid-template-columns:1fr;
    }

    canvas{

        height:350px !important;
    }

    #map{

        height:300px;
    }

    .card h2{

        font-size:22px;
    }

    .graph-title{

        font-size:28px;
    }
}

</style>

</head>

<body>

<h1>🚀 CyberWatch Dashboard</h1>

<!-- BUTTONS -->

<div class="top-buttons">

<button
class="btn start"
onclick="startMonitoring()">

▶ Start

</button>

<button
class="btn stop"
onclick="stopMonitoring()">

⏹ Stop

</button>

<button
class="btn theme"
onclick="toggleTheme()">

🌗 Theme

</button>

<button
class="btn export"
onclick="window.location='/export/pdf'">

📄 Export PDF

</button>

<button
class="btn export"
onclick="window.location='/export/csv'">

📊 Export CSV

</button>

<button
class="btn logout"
onclick="window.location='/logout'">

🚪 Logout

</button>

</div>

<!-- STATUS -->

<div id="status">

🔴 Monitoring Stopped

</div>

<!-- LIVE DATA -->

<div class="container">

<div class="card">

<h2>📡 Network Packets</h2>

<ul id="packets"></ul>

</div>

<div class="card">

<h2>⌨️ Keystrokes</h2>

<ul id="keys"></ul>

</div>

</div>

<!-- GRAPH -->

<div class="graph-title">

📊 Live Network Traffic

</div>

<canvas id="chart"></canvas>

<!-- ATTACK MAP -->

<div class="graph-title">

🌍 Live Attack Map

</div>

<div id="map"></div>

<!-- NOTIFICATIONS -->

<div class="notifications">

<h2>🔔 Real-Time Notifications</h2>

<div id="notifications"></div>

</div>

<!-- GEO IP -->

<div class="geo-box">

<h2>🌐 Geo IP Tracking</h2>

<div id="geoData"></div>

</div>

<script>

/* STATUS */

const statusDiv =
document.getElementById("status")

/* THEME */

function toggleTheme(){

    document.body.classList.toggle(
        "light-mode"
    )
}

/* START */

function startMonitoring(){

    statusDiv.innerHTML =
    "🟢 Starting Monitoring..."

    fetch('/start')

    .then(res => res.json())

    .then(data => {

        statusDiv.innerHTML =
        "🟢 Monitoring Active"

        showNotification(
            "🚀 Monitoring Started"
        )

        updateDashboard()
    })

    .catch(err => {

        console.log(err)

        statusDiv.innerHTML =
        "❌ Failed To Start"
    })
}


function stopMonitoring(){

    statusDiv.innerHTML =
    "🔴 Stopping Monitoring..."

    fetch('/stop')

    .then(res => res.json())

    .then(data => {

        statusDiv.innerHTML =
        "🔴 Monitoring Stopped"

        showNotification(
            "⏹ Monitoring Stopped"
        )

        updateDashboard()
    })

    .catch(err => {

        console.log(err)

        statusDiv.innerHTML =
        "❌ Failed To Stop"
    })
}

function showNotification(message){

    const notificationDiv =
    document.getElementById(
        "notifications"
    )

    notificationDiv.innerHTML =

    `

    <div class="notification-item">

        ${message}

    </div>

    ` + notificationDiv.innerHTML
}

/* CHART */

const chart = new Chart(

    document.getElementById("chart"),

    {

        type:'bar',

        data:{

            labels:[],

            datasets:[{

                label:'Packet Count',

                data:[],

                backgroundColor:[

                    '#22c55e',
                    '#3b82f6',
                    '#f59e0b',
                    '#ef4444',
                    '#a855f7',
                    '#06b6d4',
                    '#84cc16',
                    '#f97316',
                    '#14b8a6',
                    '#8b5cf6'

                ],

                borderRadius:12,

                barThickness:
                window.innerWidth < 768
                ? 25
                : 45

            }]
        },

        options:{

            responsive:true,

            maintainAspectRatio:false,

            animation:false,

            plugins:{

                legend:{

                    labels:{

                        color:'white',

                        font:{

                            size:16,

                            weight:'bold'
                        }
                    }
                },

                tooltip:{

                    enabled:true,

                    titleFont:{
                        size:18
                    },

                    bodyFont:{
                        size:16
                    },

                    padding:14
                }
            },

            scales:{

                x:{

                    ticks:{

                        color:'white',

                        font:{

                            size:
                            window.innerWidth < 768
                            ? 11
                            : 16,

                            weight:'bold'
                        }
                    }
                },

                y:{

                    beginAtZero:true,

                    ticks:{

                        color:'white',

                        font:{

                            size:
                            window.innerWidth < 768
                            ? 11
                            : 16,

                            weight:'bold'
                        }
                    }
                }
            }
        }
    }
)

/* MAP */

const map = L.map('map').setView([20, 78], 4)

L.tileLayer(

'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',

{
    attribution:'OpenStreetMap'
}

).addTo(map)

/* UPDATE DASHBOARD */

function updateDashboard(){

    fetch('/live_data')

    .then(res => res.json())

    .then(data => {

        console.log(data)

        /* STATUS */

        if(data.monitoring){

            statusDiv.innerHTML =
            "🟢 Monitoring Active"

        }else{

            statusDiv.innerHTML =
            "🔴 Monitoring Stopped"
        }

        /* PACKETS */

        document
        .getElementById("packets")
        .innerHTML =

        data.packets.map(

            p => `<li>${p}</li>`

        ).join("")

        /* KEYS */

        document
        .getElementById("keys")
        .innerHTML =

        data.keys.map(

            k => `<li>${k}</li>`

        ).join("")

        /* GRAPH */

        chart.data.labels =
        data.labels

        chart.data.datasets[0].data =
        data.values

        chart.update()

        /* NOTIFICATIONS */

        const notificationDiv =

        document.getElementById(
            "notifications"
        )

        notificationDiv.innerHTML =

        data.notifications.map(

            n => `

            <div class="notification-item">

                ${n}

            </div>

            `

        ).join("")

        /* GEO IP */

        const geoDiv =

        document.getElementById(
            "geoData"
        )

        geoDiv.innerHTML =

        data.geo.map(g => `

            <div class="geo-card">

                <b>IP:</b> ${g.ip}<br>

                <b>Country:</b> ${g.country}<br>

                <b>City:</b> ${g.city}<br>

                <b>ISP:</b> ${g.isp}

            </div>

        `).join("")

        /* REMOVE OLD MARKERS */

        map.eachLayer(function(layer){

            if(layer instanceof L.Marker){

                map.removeLayer(layer)
            }
        })

        /* ADD NEW MARKERS */

        data.geo.forEach(g => {

            if(g.country !== "Unknown"){

                const marker =

                L.marker([

                    20 + Math.random()*10,

                    78 + Math.random()*10

                ])

                .addTo(map)

                .bindPopup(

                    `<b>${g.ip}</b><br>
                    ${g.country}`

                )
            }
        })

    })

    .catch(err => {

        console.log(
            "Dashboard Error:",
            err
        )
    })
}

/* AUTO UPDATE */

/* AUTO UPDATE */

setInterval(() => {

    updateDashboard()

}, 1000)


/* PAGE LOAD */

window.onload = () => {

    updateDashboard()

    /* RESTORE STATUS */

    fetch('/status')

    .then(res => res.json())

    .then(data => {

        if(data.monitoring){

            statusDiv.innerHTML =
            "🟢 Monitoring Active"

        }else{

            statusDiv.innerHTML =
            "🔴 Monitoring Stopped"
        }

    })

}

</script>

</body>
</html>
